                    output: `#!/usr/bin/env node

/**
 * Blender MCP Producer Script: Table Generation
 *
 * Creates a simple table (flat top surface with 4 legs), applies finishing touches,
 * renders hero and top-down shots, exports as STL and FBX, and saves the .blend file.
 */

const net = require('net');
const path = require('path');
const fs = require('fs');
const { promisify } = require('util');

const DEFAULT_PORT = 9876;
const DEFAULT_OUTPUT_DIR = path.join(process.cwd(), 'outputs');
const TIMEOUT_MS = 30000;

const TABLE_CONFIG = {
  top_width: 1000,
  top_depth: 800,
  top_thickness: 50,
  leg_height: 700,
  leg_size: 40,
  leg_offset: 100,
};

class BlenderMCPClient {
  constructor(port = DEFAULT_PORT) {
    this.port = port;
    this.socket = null;
    this.nextId = 1;
    this.pendingRequests = new Map();
    this.connected = false;
    this.receiveBuffer = '';
  }

  async connect() {
    return new Promise((resolve, reject) => {
      this.socket = net.createConnection(this.port, 'localhost', () => {
        this.connected = true;
        this.socket.on('data', (data) => this._handleData(data));
        this.socket.on('error', (err) => this._handleError(err));
        this.socket.on('close', () => {
          this.connected = false;
        });
        resolve();
      });

      this.socket.on('error', (err) => {
        this.connected = false;
        reject(new Error(\`Failed to connect to Blender MCP on port \${this.port}: \${err.message}\`));
      });
    });
  }

  disconnect() {
    if (this.socket) {
      this.socket.destroy();
      this.socket = null;
      this.connected = false;
    }
  }

  async call(command, params = {}, timeoutMs = TIMEOUT_MS) {
    if (!this.connected) {
      throw new Error('Not connected to Blender MCP server');
    }

    const id = this.nextId++;
    const request = { id, command, params };

    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        this.pendingRequests.delete(id);
        reject(new Error(\`Command "\${command}" timed out after \${timeoutMs}ms\`));
      }, timeoutMs);

      this.pendingRequests.set(id, { resolve, reject, timeout });

      try {
        const jsonStr = JSON.stringify(request);
        this.socket.write(jsonStr);
      } catch (err) {
        this.pendingRequests.delete(id);
        clearTimeout(timeout);
        reject(new Error(\`Failed to send command: \${err.message}\`));
      }
    });
  }

  _handleData(data) {
    this.receiveBuffer += data.toString();
    this._processBuffer();
  }

  _processBuffer() {
    let braceDepth = 0;
    let inString = false;
    let escape = false;
    let messageStart = 0;

    for (let i = 0; i < this.receiveBuffer.length; i++) {
      const char = this.receiveBuffer[i];

      if (escape) {
        escape = false;
        continue;
      }

      if (char === '\\\\') {
        escape = true;
        continue;
      }

      if (char === '"' && !escape) {
        inString = !inString;
        continue;
      }

      if (!inString) {
        if (char === '{') braceDepth++;
        if (char === '}') braceDepth--;

        if (braceDepth === 0 && i > messageStart) {
          const messageStr = this.receiveBuffer.substring(messageStart, i + 1);
          this._handleMessage(messageStr);
          messageStart = i + 1;
        }
      }
    }

    this.receiveBuffer = this.receiveBuffer.substring(messageStart);
  }

  _handleMessage(messageStr) {
    try {
      const msg = JSON.parse(messageStr);
      if (msg.id && this.pendingRequests.has(msg.id)) {
        const { resolve, reject, timeout } = this.pendingRequests.get(msg.id);
        clearTimeout(timeout);
        this.pendingRequests.delete(msg.id);

        if (msg.error) {
          reject(new Error(msg.error));
        } else {
          let result = msg.result;
          if (result && typeof result === 'object' && 'result' in result) {
            result = result.result;
          }
          resolve(result);
        }
      }
    } catch (err) {
      console.error('Failed to parse message:', messageStr, err);
    }
  }

  _handleError(err) {
    console.error('Socket error:', err);
    this.connected = false;
  }
}

(async () => {
  // Main execution
  console.log('Blender MCP Table Producer started');
})();`,

/**
 * Blender MCP Table Production Script
 * Creates a simple table model with proper topology, applies modifiers,
 * renders hero and top-down shots, and exports to STL and FBX formats.
 */

const net = require("net");
const path = require("path");
const fs = require("fs");
const { EventEmitter } = require("events");

class BlenderMCPClient extends EventEmitter {
  constructor(host = "localhost", port = 9876) {
    super();
    this.host = host;
    this.port = port;
    this.socket = null;
    this.requestId = 0;
    this.pendingRequests = new Map();
    this.buffer = "";
  }

  async connect() {
    return new Promise((resolve, reject) => {
      this.socket = net.createConnection(this.port, this.host, () => {
        console.log(\`[MCP] Connected to Blender on \${this.host}:\${this.port}\`);
        resolve();
      });

      this.socket.on("data", (data) => this._handleData(data));
      this.socket.on("error", (err) => {
        console.error(\`[MCP] Connection error:\`, err.message);
        reject(err);
      });
      this.socket.on("close", () => {
        console.log("[MCP] Connection closed");
        this.emit("closed");
      });

      setTimeout(() => {
        reject(new Error("Connection timeout"));
      }, 10000);
    });
  }

  _handleData(data) {
    this.buffer += data.toString();
    const lines = this.buffer.split("\\n");
    this.buffer = lines.pop() || "";

    for (const line of lines) {
      if (!line.trim()) continue;
      try {
        const response = JSON.parse(line);
        this._handleResponse(response);
      } catch (err) {
        console.error("[MCP] Failed to parse response:", line, err.message);
      }
    }
  }

  _handleResponse(response) {
    if (response.id && this.pendingRequests.has(response.id)) {
      const { resolve, reject, timeout } = this.pendingRequests.get(response.id);
      clearTimeout(timeout);
      this.pendingRequests.delete(response.id);

      if (response.error) {
        reject(new Error(\`\${response.error.message || "Unknown error"}\`));
      } else {
        resolve(response.result);
      }
    } else if (response.method) {
      this.emit("notification", response);
    }
  }

  async request(method, params = {}, timeoutMs = 30000) {
    if (!this.socket) throw new Error("Not connected");

    const id = ++this.requestId;
    const request = { jsonrpc: "2.0", id, method, params };

    return new Promise((resolve, reject) => {
      const timeout = setTimeout(() => {
        this.pendingRequests.delete(id);
        reject(new Error(\`Request timeout: \${method}\`));
      }, timeoutMs);

      this.pendingRequests.set(id, { resolve, reject, timeout });

      try {
        this.socket.write(JSON.stringify(request) + "\\n");
      } catch (err) {
        this.pendingRequests.delete(id);
        clearTimeout(timeout);
        reject(err);
      }
    });
  }

  async execute_bpy_script(script, description = "") {
    const params = { script };
    if (description) params.description = description;
    return this.request("execute_bpy_script", params, 60000);
  }

  async close() {
    if (this.socket) {
      this.socket.end();
      return new Promise((resolve) => {
        this.socket.on("close", resolve);
      });
    }
  }
}`,

                        ${benchmark.analysis.gaps.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `;
            document.getElementById('benchmark-tab').innerHTML = html;
        }

        function toggleEvidence(id) {
            const el = document.getElementById(id);
            el.classList.toggle('show');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function downloadFeedback() {
            const feedbackEls = document.querySelectorAll('textarea');
            feedbackEls.forEach((el, i) => {
                const val = el.value.trim();
                if (val) feedback[i] = val;
            });

            const data = {
                generated_at: new Date().toISOString(),
                skill: 'blender-mcp',
                iteration: 1,
                evals: evals.map((e, i) => ({
                    eval_id: e.id,
                    eval_name: e.name,
                    feedback: feedback[i] || ''
                }))
            };

            const json = JSON.stringify(data, null, 2);
            const blob = new Blob([json], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'feedback.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // Initialize
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') nextEval();
            if (e.key === 'ArrowLeft') prevEval();
        });

        renderEval();
        updateNavButtons();
    </script>
</body>
</html>
